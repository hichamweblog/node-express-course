version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: taskforge-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: taskforge
      MONGO_INITDB_ROOT_PASSWORD: taskforge_dev_password
      MONGO_INITDB_DATABASE: taskforge
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskforge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  redis-data:
